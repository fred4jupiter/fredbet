name: Publish Docker feature branch

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker tag (e.g., my-feature-tag)'
        required: true
        type: string

jobs:
  build:
    uses: ./.github/workflows/build-template.yml
    with:
      maven_command: 'mvn -B verify'
      upload_artifact: true
  docker:
    runs-on: ubuntu-latest
    needs: build
    env:
      DOCKER_IMAGE: fred4jupiter/fredbet
      DOCKER_TARGET_PLATFORM: linux/arm64/v8,linux/amd64
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Download jar file
        uses: actions/download-artifact@v8
        with:
          name: fredbet.jar
          path: target
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push image
        run: |
          docker buildx build \
            --platform ${DOCKER_TARGET_PLATFORM} \
            --tag ghcr.io/${DOCKER_IMAGE}:${{ inputs.docker_tag }} \
            --file ./Dockerfile \
            --output type=image,push=true .
