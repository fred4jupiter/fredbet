name: Publish Docker feature branch

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '.github/**'
      - 'extra/**'

jobs:
  build:
    uses: ./.github/workflows/build-template.yml
    with:
      maven_command: 'mvn -B verify'
      upload_artifact: true
  docker:
    runs-on: ubuntu-latest
    needs: build
    env:
      DOCKER_IMAGE: fred4jupiter/fredbet
      DOCKER_TARGET_PLATFORM: linux/arm64/v8,linux/amd64
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Download jar file
        uses: actions/download-artifact@v8
        with:
          name: fredbet.jar
          path: target
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set Docker tag from branch
        run: |
          # Derive branch name from GITHUB_REF (refs/heads/feature/...) and sanitize it to a valid docker tag
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          # lowercase, replace slashes with '-', remove invalid characters, collapse repeated '-' and trim
          DOCKER_TAG=$(echo "$BRANCH_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's@/@-@g' \
            | sed 's/[^a-z0-9._-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV
        shell: bash
      - name: Build and push image
        run: |
          docker buildx build \
            --platform ${DOCKER_TARGET_PLATFORM} \
            --tag ghcr.io/${DOCKER_IMAGE}:${DOCKER_TAG} \
            --file ./Dockerfile \
            --output type=image,push=true .
