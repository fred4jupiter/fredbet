<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{_layout}">
<head>
	<title th:text="#{bet.listOpen.title}"></title>
</head>
<body>
	<div layout:fragment="content">
		<h1 th:text="#{bet.listOpen.title} + ' (' + ${#lists.size(matchesToBet)} + ')'"></h1>
		<div class="row" th:if="${not #lists.isEmpty(matchesToBet)}">
			<div class="col-12 mb-3">
                <a href="#" th:href="@{'/bet/dice'}" class="btn btn-info" role="button">
                    <span class="fas fa-dice"></span> <span th:text="#{bet.listOpen.dice.all}"></span>
                </a>
			</div>
		</div>
		<div class="row">
			<div class="col-12 col-sm-8 col-md-6 col-lg-4" th:each="matchCommand : ${matchesToBet}">
				<div class="card mb-3">
					<div class="card-body">
						<div class="row">
							<div class="col-12">
                                <img class="fi" th:src="${matchCommand.match.teamOne.crestsAsBase64}" alt="crests"/>
<!--                                <span class="" th:classappend="${@teamUtil.cssClassFor(matchCommand.getCountryTeamOne())}"></span>-->
<!--								<span class="bold" th:text="${matchCommand.teamNameOne}"></span>-->
                                <span class="bold" th:text="${matchCommand.match.teamOne.getNameTranslated(@messageSourceUtil)}"></span>
								<span> - </span>
<!--                                <span class="" th:classappend="${@teamUtil.cssClassFor(matchCommand.getCountryTeamTwo())}"></span>-->
                                <img class="fi" th:src="${matchCommand.match.teamTwo.crestsAsBase64}" alt="crests"/>
<!--								<span class="bold" th:text="${matchCommand.teamNameTwo}"></span>-->
                                <span class="bold" th:text="${matchCommand.match.teamTwo.getNameTranslated(@messageSourceUtil)}"></span>
							</div>
						</div>
						<div class="row">
							<div class="col-9">
								<span th:text="${#temporals.format(matchCommand.match.kickOffDate, 'EEE dd. MMMM yyyy HH:mm')}"></span>
								<br/>
								<span th:text="#{${matchCommand.match.group.titleMsgKey}}"></span>
								<br/>
								<span th:text="${matchCommand.match.stadium}"></span>
							</div>
							<div class="col-3">
								<a href="#" th:href="@{'/bet/createOrUpdate/' + ${matchCommand.match.id} + '?redirectViewName=OPEN_BETS'}" th:classappend="${matchCommand.match.hasMatchStarted()}? 'disabled'"
									class="btn btn-success" role="button">
									<span class="fas fa-thumbs-up fa-lg"></span>
								</a>
							</div>
						</div>
				   </div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
